name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------
      # Node
      # -----------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      
      # -----------------------------
      # pnpm setup
      # -----------------------------
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      
      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # Detect changes
      # -----------------------------
      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1)

          if echo "$CHANGED" | grep -E '^(src|public|vite.config|package.json)'; then
            echo "build_required=true" >> $GITHUB_OUTPUT
          else
            echo "build_required=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # Cache vite
      # -----------------------------
      - uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            dist
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            vite-${{ runner.os }}-

      # -----------------------------
      # Prettier
      # -----------------------------
      - name: Prettier
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD || true　\
            | grep -E '\.(js|ts|tsx|jsx|json|css|md)$' \
            | grep -v '^node_modules/' || true)

          if [ -n "$CHANGED" ]; then
            pnpm exec prettier --write $CHANGED
          else
            echo "No files to format"
          fi

      # -----------------------------
      # Auto format commit
      # -----------------------------
      - name: Commit formatting
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git restore --staged .github/workflows || true

          if ! git diff --cached --quiet; then
            git commit -m "auto format"
            git push
          fi

      # -----------------------------
      # Lint
      # -----------------------------
      - run: pnpm run lint

      # -----------------------------
      # Typecheck
      # -----------------------------
      - run: pnpm run typecheck

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        if: steps.changes.outputs.build_required == 'true'
        run: pnpm run build

      # -----------------------------
      # Deploy
      # -----------------------------
      - name: Setup Pages
        if: github.event_name == 'push' && steps.changes.outputs.build_required == 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name == 'push' && steps.changes.outputs.build_required == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        if: github.event_name == 'push' && steps.changes.outputs.build_required == 'true'
        uses: actions/deploy-pages@v4
