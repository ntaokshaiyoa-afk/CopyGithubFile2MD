name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------
      # Node setup
      # -----------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # -----------------------------
      # pnpm setup
      # -----------------------------
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # Detect changes to rebuild
      # -----------------------------
      - name: Detect changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1)
          if echo "$CHANGED" | grep -E '^(src|public|vite.config|package.json)'; then
            echo "build_required=true" >> $GITHUB_OUTPUT
          else
            echo "build_required=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # Lint
      # -----------------------------
      - name: Lint
        run: pnpm run lint

      # -----------------------------
      # Typecheck
      # -----------------------------
      - name: Typecheck
        run: pnpm run typecheck

      # -----------------------------
      # Build (only if required)
      # -----------------------------
      - name: Build
        if: steps.changes.outputs.build_required == 'true'
        run: pnpm run build

      # -----------------------------
      # Setup Pages
      # -----------------------------
      - name: Setup Pages
        if: steps.changes.outputs.build_required == 'true'
        uses: actions/configure-pages@v4

      # -----------------------------
      # Upload artifact
      # -----------------------------
      - name: Upload artifact
        if: steps.changes.outputs.build_required == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # -----------------------------
      # Deploy
      # -----------------------------
      - name: Deploy
        if: steps.changes.outputs.build_required == 'true'
        uses: actions/deploy-pages@v4
